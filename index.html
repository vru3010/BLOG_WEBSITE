<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="A modern, professional blog experience with clean design and responsive layout.">
<title>Modern Blog</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <h1>MyBlog</h1>

    <div class="nav-right">
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search posts..." class="search-input">
        <button id="searchBtn" class="search-btn">🔍</button>
      </div>
      <button id="themeToggle" class="theme-btn">🌙</button>
    </div>
  </div>
</header>

<section class="hero">
  <h2>Modern Blog Experience</h2>
  <p>Clean • Premium • Responsive</p>
</section>

<section class="categories-section">
  <div class="container">
    <h3>Explore Categories</h3>
    <div class="categories-grid">
      <button class="category-btn active" data-category="all">All Posts</button>
      <button class="category-btn" data-category="technology">Technology</button>
      <button class="category-btn" data-category="lifestyle">Lifestyle</button>
      <button class="category-btn" data-category="programming">Programming</button>
      <button class="category-btn" data-category="ai">AI & ML</button>
      <button class="category-btn" data-category="health">Health</button>
    </div>
  </div>
</section>

<main class="container">
  <div id="blogContainer" class="grid"></div>
</main>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <span id="closeBtn">&times;</span>
    <div id="popupData"></div>
    <div class="social-share">
      <h4>Share this post:</h4>
      <div class="share-buttons">
        <button class="share-btn twitter" onclick="shareOnTwitter()">🐦 Twitter</button>
        <button class="share-btn linkedin" onclick="shareOnLinkedIn()">💼 LinkedIn</button>
        <button class="share-btn facebook" onclick="shareOnFacebook()">📘 Facebook</button>
        <button class="share-btn copy-link" onclick="copyLink()">🔗 Copy Link</button>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
